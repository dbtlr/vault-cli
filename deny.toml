[graph]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "workspace"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    # webpki-roots bundles the Mozilla root CA list under this license;
    # pulled in via ureq's rustls TLS feature for `vault self-update`.
    # Permissive in effect (no copyleft, no source-share requirement).
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
# Workspace-internal crates use path-only dependencies (no version),
# which cargo-deny reports as wildcards. allow-wildcard-paths does not
# apply here because the crates are not marked `publish = false`.
# Keep wildcards at "warn" until Slice 1 (Cargo metadata work) decides
# the publish posture for the inter-crate deps.
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
