[workspace]
members = ["cargo:crates/vault-cli"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.2"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax).
# Initial set: Apple Silicon, Intel Mac, x86_64 Linux musl, aarch64 Linux musl.
# Windows targets deferred until user demand surfaces.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-musl", "x86_64-apple-darwin", "x86_64-unknown-linux-musl"]
# Whether to install an updater program
install-updater = false
# Extra static files to include in each App (path relative to this Cargo.toml's dir)
include = ["target/completions/vault.bash", "target/completions/_vault", "target/completions/vault.fish", "target/man/vault.1"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Allow manual edits to generated CI files (we bumped actions/checkout and
# actions/upload-artifact to v5 to silence Node.js 20 deprecation warnings;
# remove this once cargo-dist itself ships v5 actions in its generators).
allow-dirty = ["ci"]
