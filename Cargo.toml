[workspace]
members = [
    "crates/vault-core",
    "crates/vault-index",
    "crates/vault-cli",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.7.0"

[workspace.dependencies]
anyhow = "1.0"
blake3 = "1.5"
camino = { version = "1.1", features = ["serde1"] }
clap = { version = "4.5", features = ["derive"] }
pulldown-cmark = "0.10"
regex = "1.10"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "1.0"
walkdir = "2.5"
